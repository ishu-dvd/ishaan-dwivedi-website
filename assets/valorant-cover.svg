<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff4655"/>
      <stop offset="100%" style="stop-color:#fd4556"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#ff465520" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- Valorant V logo stylized -->
  <g transform="translate(200,130)" filter="url(#glow)">
    <polygon points="-60,-50 -20,50 0,10 20,50 60,-50 30,-50 0,20 -30,-50" fill="url(#accent)" opacity="0.9"/>
  </g>
  <!-- Crosshair -->
  <g stroke="#ff4655" stroke-width="1.5" opacity="0.4">
    <line x1="185" y1="130" x2="195" y2="130"/>
    <line x1="205" y1="130" x2="215" y2="130"/>
    <line x1="200" y1="115" x2="200" y2="125"/>
    <line x1="200" y1="135" x2="200" y2="145"/>
    <circle cx="200" cy="130" r="2" fill="#ff4655"/>
  </g>
  <!-- Text -->
  <text x="200" y="220" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#ece8e1" letter-spacing="8">VALORANT</text>
  <text x="200" y="245" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ff465580" letter-spacing="3">TACTICAL SHOOTER</text>
  <!-- Decorative corner elements -->
  <path d="M10,10 L40,10 L40,13 L13,13 L13,40 L10,40 Z" fill="#ff465540"/>
  <path d="M390,10 L360,10 L360,13 L387,13 L387,40 L390,40 Z" fill="#ff465540"/>
  <path d="M10,290 L40,290 L40,287 L13,287 L13,260 L10,260 Z" fill="#ff465540"/>
  <path d="M390,290 L360,290 L360,287 L387,287 L387,260 L390,260 Z" fill="#ff465540"/>
</svg>