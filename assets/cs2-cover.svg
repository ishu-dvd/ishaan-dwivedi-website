<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#de8c17"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#f5a62315" stroke-width="0.5">
    <line x1="0" y1="60" x2="400" y2="60"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="180" x2="400" y2="180"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
    <line x1="320" y1="0" x2="320" y2="300"/>
  </g>
  <!-- CS2 crosshair -->
  <g transform="translate(200,120)" filter="url(#glow)">
    <line x1="-30" y1="0" x2="-8" y2="0" stroke="#f5a623" stroke-width="2"/>
    <line x1="8" y1="0" x2="30" y2="0" stroke="#f5a623" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="-8" stroke="#f5a623" stroke-width="2"/>
    <line x1="0" y1="8" x2="0" y2="30" stroke="#f5a623" stroke-width="2"/>
    <circle cx="0" cy="0" r="2" fill="#f5a623"/>
  </g>
  <!-- Shield / star shape -->
  <g transform="translate(200,120)" opacity="0.15">
    <polygon points="0,-55 15,-20 55,-18 25,8 35,45 0,25 -35,45 -25,8 -55,-18 -15,-20" fill="#f5a623"/>
  </g>
  <!-- Text -->
  <text x="200" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#ece8e1" letter-spacing="4">CS2</text>
  <text x="200" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f5a62380" letter-spacing="3">COUNTER-STRIKE 2</text>
  <!-- Decorative corners -->
  <path d="M10,10 L40,10 L40,13 L13,13 L13,40 L10,40 Z" fill="#f5a62340"/>
  <path d="M390,10 L360,10 L360,13 L387,13 L387,40 L390,40 Z" fill="#f5a62340"/>
  <path d="M10,290 L40,290 L40,287 L13,287 L13,260 L10,260 Z" fill="#f5a62340"/>
  <path d="M390,290 L360,290 L360,287 L387,287 L387,260 L390,260 Z" fill="#f5a62340"/>
</svg>
